<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUBG Mobile | الملكي لبيع السيارات</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-yellow: #ffcc00;
            --neon-blue: #00f2fe;
            --bg-dark: #08080a;
            --card-bg: #111114;
            --text-gray: #a0a0a0;
        }

        body { 
            font-family: 'Cairo', sans-serif; 
            background-color: var(--bg-dark); 
            color: white; 
            margin: 0;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #08080a 100%);
        }

        /* رأس الصفحة */
        .main-header { 
            background: rgba(17, 17, 20, 0.9);
            backdrop-filter: blur(10px);
            padding: 20px 5%; 
            border-bottom: 2px solid var(--neon-yellow); 
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }

        .logo-text { font-weight: 900; font-size: 24px; color: #fff; text-transform: uppercase; letter-spacing: 2px; }
        .logo-text span { color: var(--neon-yellow); text-shadow: 0 0 10px var(--neon-yellow); }

        /* صندوق الرصيد الملكي */
        .uc-balance-box {
            background: rgba(255, 204, 0, 0.1);
            border: 1px solid var(--neon-yellow);
            padding: 10px 25px;
            border-radius: 50px;
            font-weight: 900;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--neon-yellow);
            box-shadow: 0 0 15px rgba(255, 204, 0, 0.2);
        }

        .uc-balance-box span { font-size: 24px; }

        /* حاوية السيارات */
        .shop-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 30px; 
            padding: 50px 5%; 
            max-width: 1400px; 
            margin: auto;
        }

        /* بطاقة السيارة الملكية */
        .car-item { 
            background: var(--card-bg); 
            border-radius: 20px; 
            padding: 25px; 
            border: 1px solid #222; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .car-item:hover { 
            transform: scale(1.05);
            border-color: var(--neon-yellow);
            box-shadow: 0 15px 40px rgba(255, 204, 0, 0.15);
        }

        .car-item::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,204,0,0.05) 0%, rgba(0,0,0,0) 70%);
            opacity: 0; transition: 0.4s;
        }
        .car-item:hover::before { opacity: 1; }

        /* صور السيارات الملكية */
        .car-item img { 
            width: 100%; 
            height: 180px; 
            object-fit: contain; 
            margin-bottom: 20px;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5));
            position: relative;
            z-index: 2;
        }

        .car-item h3 { font-weight: 700; font-size: 22px; margin: 0; color: #fff; }
        .car-item p { color: var(--text-gray); font-size: 14px; margin: 5px 0 20px 0; text-transform: uppercase; }

        /* السعر والزر */
        .price-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #222;
            padding-top: 20px;
            margin-top: auto;
        }

        .uc-cost { font-size: 24px; color: #4ff34f; font-weight: 900; }

        .buy-action-btn { 
            background: linear-gradient(135deg, #ffcc00 0%, #ff9900 100%);
            color: #000;
            border: none; 
            padding: 12px 25px; 
            border-radius: 10px; 
            font-weight: 900; 
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .buy-action-btn:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(255, 153, 0, 0.4); }

        /* إشعار النجاح */
        #notification-popup {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #2ecc71;
            color: white;
            padding: 15px 30px;
            border-radius: 15px;
            font-weight: bold;
            display: none;
            z-index: 9999;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
    </style>
</head>
<body>

<audio id="purchase-sound" src="https://www.soundjay.com/buttons/sounds/button-09.mp3" preload="auto"></audio>

<div id="notification-popup">تم شراء السيارة وإضافتها لمرآبك! ✅</div>

<div class="main-header">
    <div class="logo-text">PUBG <span>PREMIUM</span></div>
    <div class="uc-balance-box">
        <img src="https://img.icons8.com/color/30/coins.png" alt="coin">
        <span id="uc-balance-display">5000</span> UC
    </div>
</div>

<div class="shop-grid" id="main-shop-grid">
    </div>

<script>
    // قائمة بأحدث وأندر سيارات ببجي مع روابط صور شغالة 100%
    const pubgCars = [
        { name: "McLaren 570S", type: "Lunar White", img: "https://www.pubgmobile.com/images/event/car_skin/car4.png" },
        { name: "Lamborghini Aventador", type: "SVJ Vermillion", img: "https://www.pubgmobile.com/images/event/car_skin/car5.png" },
        { name: "Koenigsegg Jesko", type: "Silver Gray", img: "https://www.pubgmobile.com/images/event/car_skin/car3.png" },
        { name: "Aston Martin DBS", img: "https://www.pubgmobile.com/images/event/car_skin/car6.png" },
        { name: "Dodge Challenger", type: "SRT Hellcat", img: "https://www.pubgmobile.com/images/event/car_skin/car7.png" },
        { name: "Bugatti La Voiture Noire", img: "https://www.pubgmobile.com/images/event/car_skin/car9.png" }
    ];

    let currentBalance = localStorage.getItem('user_uc_v3') ? parseInt(localStorage.getItem('user_uc_v3')) : 5000;
    document.getElementById('uc-balance-display').innerText = currentBalance;

    const grid = document.getElementById('main-shop-grid');

    pubgCars.forEach((car, index) => {
        const price = 60 + (index * 60);
        
        const cardHtml = `
            <div class="car-item">
                <img src="${car.img}" onerror="this.src='https://img.icons8.com/fluency/180/car--v1.png'; this.style.opacity=0.3;" alt="${car.name}">
                <h3>${car.name}</h3>
                <p>${car.type || 'Mythic Item'}</p>
                <div class="price-section">
                    <div class="uc-cost">${price} UC</div>
                    <button class="buy-action-btn" onclick="buyItem(${price})">شراء الآن</button>
                </div>
            </div>
        `;
        grid.innerHTML += cardHtml;
    });

    function buyItem(price) {
        if (currentBalance >= price) {
            // تشغيل الصوت
            document.getElementById('purchase-sound').play();
            
            // خصم العملات
            currentBalance -= price;
            updateUI();
            
            // إظهار التنبيه
            const popup = document.getElementById('notification-popup');
            popup.style.display = 'block';
            setTimeout(() => { popup.style.display = 'none'; }, 2500);
        } else {
            alert("رصيد UC غير كافٍ! يرجى الشحن أولاً.");
        }
    }

    function updateUI() {
        document.getElementById('uc-balance-display').innerText = currentBalance;
        localStorage.setItem('user_uc_v3', currentBalance);
    }
</script>

</body>
</html>
