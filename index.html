<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUBG Mobile | Holographic Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --holo-cyan: #00f2fe;
            --holo-blue: #4facfe;
            --dark-bg: #020205;
            --glass-bg: rgba(0, 242, 254, 0.03);
            --glass-border: rgba(0, 242, 254, 0.15);
            --text-shadow: 0 0 10px rgba(0, 242, 254, 0.7);
        }

        body { 
            font-family: 'Cairo', sans-serif; 
            background-color: var(--dark-bg);
            color: #fff; 
            margin: 0;
            min-height: 100vh;
            background-image: 
                radial-gradient(at 10% 10%, rgba(79, 172, 254, 0.15) 0px, transparent 50%),
                radial-gradient(at 90% 90%, rgba(0, 242, 254, 0.15) 0px, transparent 50%);
            background-attachment: fixed;
        }

        /* رأس الصفحة الهولوغرافي */
        .holo-header {
            background: rgba(2, 2, 5, 0.8);
            backdrop-filter: blur(20px);
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.5);
        }

        .terminal-title {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 22px;
            color: var(--holo-cyan);
            text-shadow: var(--text-shadow);
            letter-spacing: 2px;
        }

        .uc-tracker {
            background: var(--glass-bg);
            border: 1px solid var(--holo-blue);
            padding: 8px 25px;
            border-radius: 50px;
            color: #fff;
            font-weight: 700;
            font-size: 18px;
            font-family: 'Orbitron', sans-serif;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: inset 0 0 15px rgba(79, 172, 254, 0.2);
        }

        .uc-tracker span { color: var(--holo-cyan); text-shadow: var(--text-shadow); }

        /* حاوية المتجر */
        .main-container {
            max-width: 1400px;
            margin: auto;
            padding: 40px 5%;
        }

        .page-info {
            text-align: center;
            margin-bottom: 50px;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 20px;
        }

        .page-info h1 {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 32px;
            color: #fff;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        .page-info p { color: var(--holo-blue); margin: 5px 0 0 0; font-size: 14px; }

        .holo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px;
        }

        /* بطاقة الهولوغرام */
        .holo-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 25px;
            position: relative;
            transition: 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            overflow: hidden;
            backdrop-filter: blur(5px);
        }

        .holo-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0) 100%);
            clip-path: polygon(0 0, 100% 0, 100% 20%, 0 20%);
        }

        .holo-card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: var(--holo-cyan);
            background: rgba(0, 242, 254, 0.05);
            box-shadow: 0 15px 40px rgba(0, 242, 254, 0.2);
        }

        .car-display {
            width: 100%;
            height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            position: relative;
        }
        
        .car-display::after {
            content: '';
            position: absolute;
            bottom: -10px; width: 60%; height: 10px;
            background: rgba(0, 242, 254, 0.3);
            border-radius: 50%;
            filter: blur(5px);
            transition: 0.4s;
        }
        
        .holo-card:hover .car-display::after { background: rgba(0, 242, 254, 0.6); filter: blur(8px); }

        .holo-card img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5));
            transition: 0.5s;
        }
        
        .holo-card:hover img { transform: translateY(-10px); }

        .car-meta {
            border-top: 1px solid var(--glass-border);
            padding-top: 15px;
        }

        .car-name { font-family: 'Orbitron', sans-serif; font-size: 20px; color: #fff; font-weight: 700; }
        .rarity { font-size: 11px; color: var(--holo-blue); text-transform: uppercase; letter-spacing: 1px; }

        .price-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 20px 0;
        }

        .cost {
            font-family: 'Orbitron', sans-serif;
            color: var(--holo-cyan);
            font-size: 26px;
            font-weight: 900;
            text-shadow: var(--text-shadow);
        }

        .acquire-btn {
            background: transparent;
            border: 1px solid var(--holo-cyan);
            color: var(--holo-cyan);
            padding: 12px 30px;
            border-radius: 4px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }

        .acquire-btn::after {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 242, 254, 0.3), transparent);
            transition: 0.5s;
        }

        .acquire-btn:hover {
            background: rgba(0, 242, 254, 0.1);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.5);
        }
        
        .acquire-btn:hover::after { left: 100%; }

        /* المرآب الشخصي */
        .personal-garage {
            margin-top: 60px;
            background: rgba(2, 2, 5, 0.5);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 40px;
            backdrop-filter: blur(10px);
        }

        .garage-header {
            font-family: 'Orbitron', sans-serif;
            color: #fff;
            font-size: 22px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .garage-header::before { content: ''; width: 10px; height: 10px; background: var(--holo-cyan); border-radius: 50%; box-shadow: var(--text-shadow); }

        .owned-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 15px;
        }

        .owned-slot {
            height: 130px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            padding: 10px;
            transition: 0.3s;
        }
        
        .owned-slot:hover { border-color: var(--holo-cyan); background: rgba(0, 242, 254, 0.05); }

        .owned-slot img { max-width: 100%; max-height: 100%; object-fit: contain; }
    </style>
</head>
<body>

<header class="holo-header">
    <div class="terminal-title">VEHICLE_TERMINAL_v5.0</div>
    <div class="uc-tracker">
        <img src="https://img.icons8.com/fluency/30/coins.png" alt="UC Icon"/>
        BALANCE: <span id="uc-amount">5000</span>
    </div>
</header>

<div class="main-container">
    <div class="page-info">
        <h1>Vehicle Marketplace</h1>
        <p>Select a unit to acquire and transfer to your personal garage.</p>
    </div>

    <div class="holo-grid" id="marketGrid"></div>

    <div class="personal-garage">
        <div class="garage-header">PRIVATE GARAGE SYSTEMS</div>
        <div class="owned-grid" id="garageGrid">
            </div>
    </div>
</div>

<script>
    // بيانات السيارات مع روابط الصور الشغالة
    const carsData = [
        { id: 1, name: "McLaren 570S", type: "Exotic", img: "https://raw.githubusercontent.com/A7med-Ragaa/PUBG-Car-Images/main/mclaren.png" },
        { id: 2, name: "Lamborghini SVJ", type: "Exotic", img: "https://raw.githubusercontent.com/A7med-Ragaa/PUBG-Car-Images/main/lambo.png" },
        { id: 3, name: "Koenigsegg Jesko", type: "Hypercar", img: "https://raw.githubusercontent.com/A7med-Ragaa/PUBG-Car-Images/main/koenigsegg.png" },
        { id: 4, name: "Dodge Challenger", type: "Muscle", img: "https://raw.githubusercontent.com/A7med-Ragaa/PUBG-Car-Images/main/dodge.png" },
        { id: 5, name: "Aston Martin Valkyrie", type: "Hypercar", img: "https://raw.githubusercontent.com/A7med-Ragaa/PUBG-Car-Images/main/aston.png" },
        { id: 6, name: "Bugatti La Voiture", type: "Hypercar", img: "https://raw.githubusercontent.com/A7med-Ragaa/PUBG-Car-Images/main/bugatti.png" }
    ];

    let currentUC = localStorage.getItem('uc_holo_v5') ? parseInt(localStorage.getItem('uc_holo_v5')) : 5000;
    let ownedCars = JSON.parse(localStorage.getItem('owned_holo_v5')) || [];

    function init() {
        document.getElementById('uc-amount').innerText = currentUC;
        renderMarket();
        renderGarage();
    }

    function renderMarket() {
        const market = document.getElementById('marketGrid');
        market.innerHTML = '';
        carsData.forEach((car, index) => {
            const price = 60 + (index * 60);
            market.innerHTML += `
                <div class="holo-card">
                    <div class="car-display">
                        <img src="${car.img}" onerror="this.src='https://img.icons8.com/fluency/180/car--v1.png'; this.style.opacity=0.3;">
                    </div>
                    <div class="car-meta">
                        <div class="car-name">${car.name}</div>
                        <span class="rarity">${car.type} Unit</span>
                    </div>
                    <div class="price-row">
                        <div class="cost">${price}</div>
                        <button class="acquire-btn" onclick="acquire(${index}, ${price})">Acquire</button>
                    </div>
                </div>
            `;
        });
    }

    function acquire(index, cost) {
        if (currentUC >= cost) {
            currentUC -= cost;
            ownedCars.push(carData[index]);
            saveData();
            init();
            // تنبيه بسيط
            const synth = window.speechSynthesis;
            const utterThis = new SpeechSynthesisUtterance("UNIT ACQUIRED");
             utterThis.lang = 'en-US';
            synth.speak(utterThis);
        } else {
            alert("ERROR: INSUFFICIENT BALANCE");
        }
    }

    function renderGarage() {
        const garage = document.getElementById('garageGrid');
        garage.innerHTML = ownedCars.length === 0 ? '<p style="color:#444; font-family: Cairo; grid-column: 1/-1; text-align: center;">المرآب فارغ، قم بالاستحواذ على وحدات من السوق...</p>' : '';
        ownedCars.forEach(car => {
            garage.innerHTML += `<div class="owned-slot"><img src="${car.img}" onerror="this.src='https://img.icons8.com/fluency/180/car--v1.png'; this.style.opacity=0.3;"></div>`;
        });
    }

    function saveData() {
        localStorage.setItem('uc_holo_v5', currentUC);
        localStorage.setItem('owned_holo_v5', JSON.stringify(ownedCars));
    }

    init();
</script>

</body>
</html>
