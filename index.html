<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>PUBG Shop</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f172a;
  color:white;
  text-align:center;
}

h1 {
  margin:20px;
  color:#facc15;
}

.balance {
  background:#1e293b;
  display:inline-block;
  padding:10px 20px;
  border-radius:10px;
  margin-bottom:20px;
}

.shop {
  display:flex;
  justify-content:center;
  gap:15px;
  flex-wrap:wrap;
}

.card {
  background:#1e293b;
  width:200px;
  border-radius:12px;
  overflow:hidden;
}

.card img {
  width:100%;
  height:120px;
  object-fit:cover;
}

.card h3 {
  margin:10px 0 5px;
}

.card p {
  color:#22c55e;
}

button {
  width:100%;
  padding:10px;
  border:none;
  background:#22c55e;
  color:white;
  cursor:pointer;
}

/* popup */
.popup {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  display:none;
  align-items:center;
  justify-content:center;
}

.box {
  background:#1e293b;
  padding:20px;
  border-radius:12px;
  width:280px;
}

input {
  width:90%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:8px;
}

/* success */
.success {
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#22c55e;
  padding:10px 20px;
  border-radius:10px;
  display:none;
}
</style>

</head>

<body>

<h1>🚗 PUBG Shop</h1>

<div class="balance">
💰 <span id="coins">1000</span> UC
</div>

<div class="shop" id="shop"></div>

<!-- popup -->
<div class="popup" id="popup">
  <div class="box">
    <h3 id="carName"></h3>
    <input id="playerID" placeholder="Player ID">
    <br><br>
    <button onclick="confirmBuy()">Confirm</button>
    <button onclick="closePopup()" style="background:red;margin-top:5px;">Cancel</button>
  </div>
</div>

<!-- success -->
<div class="success" id="successBox"></div>

<script>
let coins = 1000;
let selectedPrice = 0;
let selectedCar = "";

document.getElementById("coins").innerText = coins;

let cars = [
 {name:"Buggy", price:60, img:"https://i.imgur.com/8Km9tLL.png"},
 {name:"Dacia", price:120, img:"https://i.imgur.com/Vz81P9K.png"},
 {name:"UAZ", price:180, img:"https://i.imgur.com/9Q9Z1Zm.png"}
];

let shop = document.getElementById("shop");

cars.forEach(car=>{
  shop.innerHTML += `
    <div class="card">
      <img src="${car.img}">
      <h3>${car.name}</h3>
      <p>${car.price} UC</p>
      <button onclick="openPopup(${car.price},'${car.name}')">شراء</button>
    </div>
  `;
});

function openPopup(price,name){
  selectedPrice = price;
  selectedCar = name;
  document.getElementById("popup").style.display="flex";
  document.getElementById("carName").innerText = name;
}

function closePopup(){
  document.getElementById("popup").style.display="none";
}

function confirmBuy(){
  let id = document.getElementById("playerID").value;

  if(id=="") return;

  if(coins >= selectedPrice){
    coins -= selectedPrice;
    document.getElementById("coins").innerText = coins;

    closePopup();

    let box = document.getElementById("successBox");
    box.innerText = "تم إرسال " + selectedCar + " إلى ID: " + id;
    box.style.display="block";

    setTimeout(()=>{ box.style.display="none"; },2500);
  }
}
</script>

</body>
</html>
