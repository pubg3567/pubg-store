<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ببجي موبايل | معرض السيارات الملكي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #ffcc00;
            --bg-gradient: radial-gradient(circle at center, #1a1a2e 0%, #0a0a0a 100%);
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body { 
            font-family: 'Cairo', sans-serif; 
            background: var(--bg-gradient);
            color: white; 
            margin: 0;
            min-height: 100vh;
        }

        /* رأس الصفحة بتصميم زجاجي */
        .navbar {
            backdrop-filter: blur(15px);
            background: rgba(0, 0, 0, 0.7);
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo { font-weight: 900; font-size: 24px; color: var(--gold); text-transform: uppercase; letter-spacing: 2px; }

        .uc-badge {
            background: linear-gradient(90deg, #ffcc00, #f39c12);
            color: #000;
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: 900;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 0 20px rgba(255, 204, 0, 0.4);
        }

        /* شبكة السيارات */
        .shop-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            padding: 40px 5%;
            max-width: 1400px;
            margin: auto;
        }

        .car-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 20px;
            text-align: center;
            transition: 0.4s;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(5px);
        }

        .car-card:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--gold);
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        .car-card img {
            width: 100%;
            height: 160px;
            object-fit: contain;
            margin-bottom: 15px;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5));
            transition: 0.5s;
        }

        .car-card:hover img { transform: scale(1.1) rotate(-3deg); }

        .car-name { font-size: 20px; font-weight: 700; margin-bottom: 5px; }
        .car-rarity { font-size: 12px; color: var(--gold); text-transform: uppercase; margin-bottom: 15px; display: block; }

        .price-tag {
            font-size: 24px;
            font-weight: 900;
            color: #fff;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 5px;
        }

        .buy-btn {
            background: transparent;
            border: 2px solid var(--gold);
            color: var(--gold);
            padding: 12px;
            border-radius: 12px;
            width: 100%;
            cursor: pointer;
            font-weight: 700;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .buy-btn:hover {
            background: var(--gold);
            color: #000;
            box-shadow: 0 0 15px var(--gold);
        }

        /* إشعار النجاح */
        #toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #27ae60;
            color: white;
            padding: 15px 30px;
            border-radius: 15px;
            display: none;
            animation: slideIn 0.4s ease;
            z-index: 2000;
        }

        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
    </style>
</head>
<body>

<audio id="clickSound" src="https://www.soundjay.com/buttons/sounds/button-09.mp3" preload="auto"></audio>

<nav class="navbar">
    <div class="logo">PUBG CAR CENTER</div>
    <div class="uc-badge">
        <span>رصيدك:</span>
        <span id="uc-balance">5000</span>
        <span>UC</span>
    </div>
</nav>

<div class="shop-container" id="carsGrid"></div>

<div id="toast">تم فتح الصندوق بنجاح! 📦</div>

<script>
    const cars = [
        { name: "Lamborghini Aventador", img: "https://www.pubgmobile.com/images/event/car_skin/car5.png" },
        { name: "McLaren 570S", img: "https://www.pubgmobile.com/images/event/car_skin/car4.png" },
        { name: "Koenigsegg Jesko", img: "https://www.pubgmobile.com/images/event/car_skin/car3.png" },
        { name: "Aston Martin DBS", img: "https://www.pubgmobile.com/images/event/car_skin/car6.png" },
        { name: "Dodge Challenger", img: "https://www.pubgmobile.com/images/event/car_skin/car7.png" },
        { name: "Bugatti La Voiture", img: "https://www.pubgmobile.com/images/event/car_skin/car9.png" },
        { name: "Pagani Imola", img: "https://www.pubgmobile.com/images/event/car_skin/car8.png" },
        { name: "Bentley Mulliner", img: "https://www.pubgmobile.com/images/event/car_skin/car10.png" }
    ];

    let uc = localStorage.getItem('pubg_uc') ? parseInt(localStorage.getItem('pubg_uc')) : 5000;
    document.getElementById('uc-balance').innerText = uc;

    const grid = document.getElementById('carsGrid');

    cars.forEach((car, index) => {
        const price = 60 + (index * 60);
        const card = document.createElement('div');
        card.className = 'car-card';
        card.innerHTML = `
            <span class="car-rarity">Mythic Item</span>
            <img src="${car.img}" alt="${car.name}">
            <div class="car-name">${car.name}</div>
            <div class="price-tag">${price} <small style="font-size: 12px; color: var(--gold);">UC</small></div>
            <button class="buy-btn" onclick="processPurchase(${price})">إفتح الآن</button>
        `;
        grid.appendChild(card);
    });

    function processPurchase(cost) {
        if (uc >= cost) {
            // تشغيل الصوت
            document.getElementById('clickSound').play();
            
            // خصم الرصيد
            uc -= cost;
            updateUI();
            
            // إظهار الإشعار
            const t = document.getElementById('toast');
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        } else {
            alert("رصيد UC غير كافٍ!");
        }
    }

    function updateUI() {
        document.getElementById('uc-balance').innerText = uc;
        localStorage.setItem('pubg_uc', uc);
    }
</script>

</body>
</html>
