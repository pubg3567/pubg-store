<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>متجر سيارات ببجي</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; text-align: center; }
        .balance-box { background: #333; padding: 20px; font-size: 24px; position: sticky; top: 0; }
        .car-card { border: 1px solid #444; margin: 20px; padding: 15px; display: inline-block; width: 250px; border-radius: 10px; }
        .car-card img { width: 100%; border-radius: 5px; }
        button { background: #f39c12; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; border-radius: 5px; }
        button:disabled { background: #555; }
    </style>
</head>
<body>

<div class="balance-box">
    رصيدك: <span id="balance">1000</span> عملة UC
</div>

<div class="shop">
    <!-- سيارة 1 -->
    <div class="car-card">
        <h3>لامبورجيني</h3>
        <p>السعر: 50 UC</p>
        <button onclick="buyCar(50)">شراء الآن</button>
    </div>

    <!-- سيارة 2 -->
    <div class="car-card">
        <h3>تيسلا</h3>
        <p>السعر: 150 UC</p>
        <button onclick="buyCar(150)">شراء الآن</button>
    </div>
</div>

<script>
    let currentBalance = 1000;

    function buyCar(price) {
        if (currentBalance >= price) {
            currentBalance -= price; // عملية الطرح
            document.getElementById('balance').innerText = currentBalance;
            alert("تم الشراء بنجاح!");
        } else {
            alert("رصيدك غير كافٍ!");
        }
    }
</script>

</body>
</html>
