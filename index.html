<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUBG Mobile - متجر المركبات الملكي 3D</title>
    <style>
        :root {
            --primary: #f59e0b; /* لون برتقالي ببجي مميز */
            --primary-hover: #fbbf24;
            --bg-dark: #0f172a; /* أزرق داكن جداً للخلفية */
            --card-bg: #1e293b; /* أزرق داكن للكروت */
            --text-main: #f8fafc;
            --accent: #38bdf8; /* لون أزرق فاتح للتفاصيل */
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden; /* لمنع التمرير الأفقي */
        }

        /* خلفية خفيفة للشاشة بأكملها */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://w0.peakpx.com/wallpaper/403/182/HD-wallpaper-tesla-roadster-golden-version-electric-car-sports-car-golden-tesla.jpg'); /* استخدم نفس رابط صورة تسلا كخلفية باهتة */
            background-size: cover;
            background-position: center;
            opacity: 0.05; /* شفافة جداً */
            z-index: -1;
        }

        /* الهيدر الاحترافي */
        header {
            width: 100%;
            background: linear-gradient(180deg, rgba(245, 158, 11, 0.15) 0%, rgba(15, 23, 42, 0) 100%);
            padding: 60px 20px;
            text-align: center;
            position: relative;
        }

        h1 {
            font-size: 3rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: var(--primary);
            text-shadow: 0 0 30px rgba(245, 158, 11, 0.6), 0 0 10px rgba(245, 158, 11, 0.3);
            font-weight: 800;
        }

        header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 4px;
            background: var(--primary);
            border-radius: 2px;
            box-shadow: 0 0 15px var(--primary);
        }

        .balance-card {
            background: rgba(30, 41, 59, 0.8); /* نصف شفاف */
            padding: 20px 50px;
            border-radius: 50px;
            border: 2px solid var(--primary);
            margin-top: 30px;
            font-size: 1.8rem;
            box-shadow: 0 15px 40px rgba(0,0,0,0.7);
            display: inline-block;
            backdrop-filter: blur(10px); /* تأثير ضبابي خلف الكارت */
        }

        #balance { color: var(--primary); font-weight: bold; text-shadow: 0 0 10px rgba(245, 158, 11, 0.5); }
        .balance-card small { font-size: 1rem; color: #94a3b8; margin-right: 5px; }

        /* شبكة المنتجات */
        .shop-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
            width: 90%;
            max-width: 1300px;
            padding: 60px 0;
        }

        .item-card {
            background: var(--card-bg);
            border-radius: 25px;
            overflow: hidden;
            border: 1px solid #334155;
            transition: 0.5s cubic-bezier(0.23, 1, 0.32, 1); /* حركة أنعم */
            position: relative;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }

        .item-card:hover {
            transform: translateY(-15px) scale(1.02);
            border-color: var(--primary);
            box-shadow: 0 25px 50px rgba(0,0,0,0.8), 0 0 30px rgba(245, 158, 11, 0.2);
        }

        .item-image-container {
            height: 230px;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background-image: linear-gradient(135deg, #1e293b, #0f172a);
            position: relative;
        }

        /* إضافة تأثير توهج خلف الصورة */
        .item-image-container::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            height: 80%;
            background: radial-gradient(circle, rgba(245, 158, 11, 0.1) 0%, rgba(245, 158, 11, 0) 70%);
            border-radius: 50%;
            filter: blur(20px);
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .item-card:hover .item-image-container::after {
            opacity: 1;
        }

        .item-image {
            width: 100%;
            height: 100%;
            object-fit: contain; /* للحفاظ على كامل شكل السيارة ثلاثي الأبعاد */
            padding: 20px; /* مسافة بسيطة حول السيارة */
            transition: transform 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5)); /* ظل للصورة نفسها */
        }

        .item-card:hover .item-image {
            transform: scale(1.1) rotate(2deg); /* تكبير وتدوير بسيط */
        }

        .item-info {
            padding: 25px;
            text-align: center;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background: linear-gradient(180deg, rgba(30, 41, 59, 0) 0%, rgba(15, 23, 42, 0.5) 100%);
        }

        .item-name { 
            font-size: 1.4rem; 
            margin: 0 0 15px 0; 
            font-weight: 700;
            color: var(--text-main);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .price-box {
            background: rgba(245, 158, 11, 0.1);
            color: var(--primary);
            padding: 8px 20px;
            border-radius: 10px;
            font-weight: 800;
            margin-bottom: 25px;
            display: inline-block;
            align-self: center;
            font-size: 1.2rem;
            border: 1px solid rgba(245, 158, 11, 0.3);
            box-shadow: inset 0 0 10px rgba(245, 158, 11, 0.1);
        }

        .buy-btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: var(--primary);
            color: #000;
            font-weight: 800;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 5px 15px rgba(245, 158, 11, 0.3);
        }

        .buy-btn:hover { 
            background: var(--primary-hover); 
            box-shadow: 0 8px 25px rgba(245, 158, 11, 0.5);
            transform: translateY(-2px);
        }
        .buy-btn:active { transform: scale(0.97) translateY(0); }

        /* تنبيهات مخصصة */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #10b981;
            color: white;
            padding: 18px 35px;
            border-radius: 15px;
            display: none;
            animation: slideIn 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            z-index: 1000;
            font-weight: bold;
            font-size: 1.1rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        @keyframes slideIn { from { transform: translateX(100%) scale(0.8); opacity: 0; } to { transform: translateX(0) scale(1); opacity: 1; } }
    </style>
</head>
<body>

    <header>
        <h1>GARAGE ROYAL 3D</h1>
        <div class="balance-card">
            <small>رصيدك:</small> <span id="balance">1000</span> <small>UC</small>
        </div>
    </header>

    <div class="shop-grid" id="shop">
        </div>

    <div id="toast" class="toast">تمت إضافة المركبة إلى جراجك! ✅</div>

    <script>
        // بيانات السيارات المعدلة بروابط صور رندرات 3D
        const cars = [
            { id: 1, name: "تسلا رودستر - الإصدار الذهبي", price: 50, image: "https://w0.peakpx.com/wallpaper/403/182/HD-wallpaper-tesla-roadster-golden-version-electric-car-sports-car-golden-tesla.jpg" },
            { id: 2, name: "لامبورغيني أفينتادور", price: 150, image: "https://w0.peakpx.com/wallpaper/121/101/HD-wallpaper-lamborghini-aventador-sports-car-supercar-black-lamborghini.jpg" },
            { id: 3, name: "داسيا - تنين النار", price: 80, image: "https://w0.peakpx.com/wallpaper/241/831/HD-wallpaper-pubg-mobile-dacia-dragon-flame-skin-pubg-mobile-skins.jpg" },
            { id: 4, name: "مكلارين P1", price: 200, image: "https://w0.peakpx.com/wallpaper/601/402/HD-wallpaper-mclaren-p1-sports-car-supercar-black-mclaren.jpg" },
            { id: 5, name: "يو أي زد - الوحش", price: 60, image: "https://w0.peakpx.com/wallpaper/931/201/HD-wallpaper-pubg-mobile-uaz-monster-skin-pubg-mobile-skins.jpg" },
            { id: 6, name: "دراجة الشبح", price: 30, image: "https://w0.peakpx.com/wallpaper/101/301/HD-wallpaper-pubg-mobile-ghost-motorcycle-skin-pubg-mobile-skins.jpg" }
        ];

        // جلب الرصيد من ذاكرة المتصفح أو وضعه 1000 كافتراضي
        let currentBalance = localStorage.getItem('pubg_balance') ? 
                             parseInt(localStorage.getItem('pubg_balance')) : 1000;

        const balanceEl = document.getElementById('balance');
        const shopEl = document.getElementById('shop');

        function updateUI() {
            balanceEl.innerText = currentBalance;
            localStorage.setItem('pubg_balance', currentBalance);
        }

        function showToast(msg, color = "#10b981") {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.style.backgroundColor = color;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 3000);
        }

        function buy(price, name) {
            if (currentBalance >= price) {
                currentBalance -= price;
                updateUI();
                showToast(`تم شراء ${name} بنجاح!`);
            } else {
                showToast("عذراً، رصيدك غير كافٍ ❌", "#ef4444");
            }
        }

        // بناء المتجر تلقائياً مع استخدام وسم الصورة <img>
        cars.forEach(car => {
            shopEl.innerHTML += `
                <div class="item-card">
                    <div class="item-image-container">
                        <img src="${car.image}" alt="${car.name}" class="item-image">
                    </div>
                    <div class="item-info">
                        <div class="item-name">${car.name}</div>
                        <div class="price-box">${car.price} UC</div>
                        <button class="buy-btn" onclick="buy(${car.price}, '${car.name}')">امتلاك الآن</button>
                    </div>
                </div>
            `;
        });

        updateUI();
    </script>
</body>
</html>
