<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUBG Mobile | Tactical Garage</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-green: #00ffcc;
            --army-gray: #1a1c1e;
            --cyber-yellow: #ffcc00;
        }

        body { 
            font-family: 'Cairo', sans-serif; 
            background-color: #050505;
            color: white; 
            margin: 0;
            background-image: linear-gradient(rgba(0, 255, 204, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 255, 204, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        /* الهيدر التكتيكي */
        .top-bar {
            background: var(--army-gray);
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--neon-green);
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.2);
        }

        .system-status { font-family: 'Orbitron', sans-serif; font-size: 14px; color: var(--neon-green); }

        .uc-display {
            background: #000;
            border: 1px solid var(--cyber-yellow);
            padding: 5px 20px;
            border-radius: 4px;
            color: var(--cyber-yellow);
            font-weight: 900;
            font-size: 20px;
        }

        /* حاوية المتجر */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            padding: 40px 5%;
        }

        .tactical-card {
            background: rgba(26, 28, 30, 0.9);
            border-left: 4px solid var(--neon-green);
            padding: 20px;
            position: relative;
            transition: 0.3s;
            clip-path: polygon(0 0, 100% 0, 100% 90%, 90% 100%, 0 100%);
        }

        .tactical-card:hover { background: #25282c; transform: scale(1.02); }

        .tactical-card img {
            width: 100%;
            height: 150px;
            object-fit: contain;
            filter: drop-shadow(0 0 10px rgba(0,0,0,0.5));
        }

        .car-info { border-top: 1px solid #333; margin-top: 15px; padding-top: 10px; }
        .car-name { font-family: 'Orbitron', sans-serif; font-size: 18px; color: #fff; }
        .price { color: var(--neon-green); font-size: 22px; font-weight: bold; margin: 10px 0; }

        .buy-action {
            background: var(--neon-green);
            color: #000;
            border: none;
            padding: 10px;
            width: 100%;
            font-weight: 900;
            cursor: pointer;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
        }

        /* المرآب الشخصي */
        .garage-section {
            background: #111;
            padding: 50px 5%;
            margin-top: 50px;
            border-top: 1px dashed var(--neon-green);
        }

        .garage-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 20px;
        }

        .owned-car {
            width: 100px;
            height: 100px;
            background: #222;
            border: 1px solid #444;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
        }

        .owned-car img { width: 80%; }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="system-status">SYS_STATUS: ACTIVE // GARAGE_v4.0</div>
    <div class="uc-display"><span id="uc-val">5000</span> UC</div>
</div>

<h2 style="text-align: center; margin-top: 40px; font-family: 'Orbitron';">CENTRAL MARKETPLACE</h2>
<div class="grid-container" id="shop"></div>

<div class="garage-section">
    <h2 style="font-family: 'Orbitron'; color: var(--neon-green);">MY PRIVATE GARAGE</h2>
    <div class="garage-grid" id="myGarage">
        </div>
</div>

<script>
    const carData = [
        { id: 1, name: "Lamborghini", img: "https://www.pubgmobile.com/images/event/car_skin/car5.png" },
        { id: 2, name: "McLaren", img: "https://www.pubgmobile.com/images/event/car_skin/car4.png" },
        { id: 3, name: "Koenigsegg", img: "https://www.pubgmobile.com/images/event/car_skin/car3.png" },
        { id: 4, name: "Aston Martin", img: "https://www.pubgmobile.com/images/event/car_skin/car6.png" },
        { id: 5, name: "Dodge", img: "https://www.pubgmobile.com/images/event/car_skin/car7.png" }
    ];

    let wallet = localStorage.getItem('wallet_uc') ? parseInt(localStorage.getItem('wallet_uc')) : 5000;
    let myCars = JSON.parse(localStorage.getItem('owned_cars')) || [];

    function init() {
        document.getElementById('uc-val').innerText = wallet;
        renderShop();
        renderGarage();
    }

    function renderShop() {
        const shop = document.getElementById('shop');
        shop.innerHTML = '';
        carData.forEach((car, index) => {
            const price = 60 + (index * 60);
            shop.innerHTML += `
                <div class="tactical-card">
                    <img src="${car.img}">
                    <div class="car-info">
                        <div class="car-name">${car.name}</div>
                        <div class="price">${price} UC</div>
                        <button class="buy-action" onclick="buy(${index}, ${price})">ACQUIRE UNIT</button>
                    </div>
                </div>
            `;
        });
    }

    function buy(index, cost) {
        if (wallet >= cost) {
            wallet -= cost;
            myCars.push(carData[index]);
            save();
            init();
            alert("SUCCESS: UNIT TRANSFERRED TO GARAGE");
        } else {
            alert("ERROR: INSUFFICIENT UC BALANCE");
        }
    }

    function renderGarage() {
        const garage = document.getElementById('myGarage');
        garage.innerHTML = myCars.length === 0 ? '<p style="color:#666">No units acquired yet...</p>' : '';
        myCars.forEach(car => {
            garage.innerHTML += `<div class="owned-car"><img src="${car.img}"></div>`;
        });
    }

    function save() {
        localStorage.setItem('wallet_uc', wallet);
        localStorage.setItem('owned_cars', JSON.stringify(myCars));
    }

    init();
</script>

</body>
</html>
