<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>متجر ببجي</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg,#020617,#0f172a);
  color:white;
  text-align:center;
}

h1 {
  color:gold;
}

.card {
  background:#1e293b;
  padding:15px;
  margin:10px;
  border-radius:15px;
  display:inline-block;
  width:200px;
  box-shadow:0 0 10px black;
}

button {
  padding:10px;
  background:#22c55e;
  color:white;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

/* النافذة */
.popup {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  display:none;
  justify-content:center;
  align-items:center;
}

.popup-box {
  background:#111827;
  padding:25px;
  border-radius:20px;
  width:300px;
  box-shadow:0 0 20px gold;
  animation:scaleIn 0.3s ease;
}

@keyframes scaleIn {
  from {transform:scale(0.7);}
  to {transform:scale(1);}
}

input {
  width:90%;
  padding:10px;
  margin:10px;
  border-radius:10px;
  border:none;
}

.close {
  background:red;
  margin-top:10px;
}
</style>

</head>

<body>

<h1>🚗 متجر ببجي</h1>

<p>💰 رصيدك: <span id="coins">1000</span></p>

<div id="shop"></div>

<!-- النافذة -->
<div class="popup" id="popup">
  <div class="popup-box">
    <h3>🎮 إدخال ID اللاعب</h3>
    <input type="text" id="playerID" placeholder="اكتب ID هنا">
    <br>
    <button onclick="confirmBuy()">تأكيد الشراء</button>
    <button class="close" onclick="closePopup()">إلغاء</button>
  </div>
</div>

<script>
let coins = 1000;
let selectedPrice = 0;

document.getElementById("coins").innerText = coins;

let cars = ["Buggy","Dacia","UAZ","Mirado"];
let shop = document.getElementById("shop");

// عرض السيارات
for(let i=0;i<cars.length;i++){
  let price = (i+1)*60;

  shop.innerHTML += `
    <div class="card">
      <h3>${cars[i]}</h3>
      <p>${price} عملة</p>
      <button onclick="openPopup(${price})">شراء</button>
    </div>
  `;
}

// فتح النافذة
function openPopup(price){
  selectedPrice = price;
  document.getElementById("popup").style.display = "flex";
}

// غلق
function closePopup(){
  document.getElementById("popup").style.display = "none";
}

// تأكيد الشراء
function confirmBuy(){
  let id = document.getElementById("playerID").value;

  if(id == ""){
    alert("❌ اكتب ID");
    return;
  }

  if(coins >= selectedPrice){
    coins -= selectedPrice;
    document.getElementById("coins").innerText = coins;

    alert("✅ تم إرسال السيارة إلى ID: " + id);

    closePopup();
  } else {
    alert("❌ رصيدك ما يكفي");
  }
}
</script>

</body>
</html>
