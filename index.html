<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>متجر ببجي</title>
</head>
<body>
<h1>🚗 متجر ببجي</h1>
<p>رصيدك: <span id="coins">1000</span></p>
<div id="shop"></div>

<script>
let coins = 1000;
document.getElementById("coins").innerHTML = coins;

let cars = ["Buggy","Dacia","UAZ","Mirado"];
let shop = document.getElementById("shop");

for(let i=0;i<cars.length;i++){
  let price = (i+1)*60;
  shop.innerHTML += `<div style="margin:10px;padding:10px;border:1px solid white;">
    <h3>${cars[i]}</h3>
    <p>${price} عملة</p>
    <button onclick="buy(${price})">شراء</button>
  </div>`;
}

function buy(price){
  if(coins>=price){
    coins-=price;
    document.getElementById("coins").innerHTML = coins;
    alert("✅ تم الشراء");
  } else {
    alert("❌ رصيدك ما يكفي");
  }
}
</script>
</body>
</html>
