<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر سيارات ببجي الاحترافي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #fbc02d;
            --dark-bg: #0f0f0f;
            --card-bg: #1e1e1e;
        }

        body { 
            font-family: 'Cairo', sans-serif; 
            background-color: var(--dark-bg); 
            color: white; 
            margin: 0; 
            text-align: center;
        }

        .header { 
            background: #1a1a1a; 
            padding: 20px; 
            border-bottom: 3px solid var(--gold); 
            sticky: top;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .balance-display {
            font-size: 26px;
            color: var(--gold);
            background: rgba(251, 192, 45, 0.1);
            padding: 10px 30px;
            border-radius: 50px;
            display: inline-block;
            margin-top: 15px;
            border: 1px solid var(--gold);
        }

        .container { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); 
            gap: 20px; 
            padding: 40px; 
            max-width: 1200px; 
            margin: auto;
        }

        .card { 
            background: var(--card-bg); 
            border-radius: 15px; 
            padding: 20px; 
            border: 1px solid #333; 
            transition: 0.3s ease;
        }

        .card:hover { 
            transform: translateY(-10px); 
            border-color: var(--gold);
            box-shadow: 0 10px 20px rgba(251, 192, 45, 0.2);
        }

        /* استخدام أيقونات SVG لضمان ظهورها دائماً */
        .car-icon {
            width: 100px;
            height: auto;
            margin-bottom: 15px;
            filter: drop-shadow(0 0 10px var(--gold));
        }

        .car-name { font-size: 20px; margin-bottom: 10px; color: #fff; }

        .price { 
            font-size: 22px; 
            color: #4caf50; 
            font-weight: bold; 
            margin-bottom: 20px; 
        }

        button { 
            background: linear-gradient(to right, #fbc02d, #f9a825);
            border: none; 
            padding: 12px; 
            border-radius: 8px; 
            color: #000; 
            font-weight: bold; 
            width: 100%; 
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover { opacity: 0.9; transform: scale(1.02); }
        button:active { transform: scale(0.95); }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #4caf50;
            padding: 15px 40px;
            border-radius: 10px;
            display: none;
            z-index: 10000;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>سوق سيارات PUBG MOBILE</h1>
    <div class="balance-display">
        رصيدك: <span id="balance-val">5000</span> UC
    </div>
</div>

<div class="container" id="shop-grid">
    </div>

<div id="toast" class="toast">تمت الإضافة للمرآب بنجاح! ✅</div>

<script>
    // بيانات السيارات الحقيقية في اللعبة
    const carList = [
        "داسيا اليقطين", "جيب Godzilla", "كونيجسيج Jesko", 
        "ماكلارين 570S", "لامبورجيني Aventador", "أستون مارتن DBS", 
        "دوج تشالنجر", "باغاني ايمولا", "بوغاتي السوداء", 
        "بنتلي مولينير", "تيسلا موديل Y", "فيراري 296 GTB"
    ];

    let balance = localStorage.getItem('myUC') ? parseInt(localStorage.getItem('myUC')) : 5000;
    document.getElementById('balance-val').innerText = balance;

    const grid = document.getElementById('shop-grid');

    // صورة سيارة SVG ثابتة لا تختفي أبداً
    const carIconSvg = `
        <svg class="car-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M19 17H5V16C5 14.3431 6.34315 13 8 13H16C17.6569 13 19 14.3431 19 16V17Z" fill="#fbc02d"/>
            <path d="M3 11L5.5 5H18.5L21 11H3Z" fill="#fbc02d"/>
            <circle cx="7" cy="18" r="2" fill="#fff"/>
            <circle cx="17" cy="18" r="2" fill="#fff"/>
        </svg>
    `;

    carList.forEach((name, i) => {
        const carPrice = 60 + (i * 60); // زيادة 60 لكل سيارة
        
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
            ${carIconSvg}
            <div class="car-name">${name}</div>
            <div class="price">${carPrice} UC</div>
            <button onclick="purchase(${carPrice}, '${name}')">فتح الصندوق</button>
        `;
        grid.appendChild(card);
    });

    function purchase(cost, name) {
        if (balance >= cost) {
            balance -= cost;
            updateUI();
            showNotice();
        } else {
            alert("عذراً! رصيدك لا يكفي لشراء " + name);
        }
    }

    function updateUI() {
        document.getElementById('balance-val').innerText = balance;
        localStorage.setItem('myUC', balance);
    }

    function showNotice() {
        const t = document.getElementById('toast');
        t.style.display = 'block';
        setTimeout(() => { t.style.display = 'none'; }, 2000);
    }
</script>

</body>
</html>
