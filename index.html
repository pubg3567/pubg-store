<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر سيارات PUBG Mobile</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ffb100;
            --accent: #ff4d4d;
            --bg-dark: #0f1218;
            --card-bg: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at top, #1e2530 0%, #0f1218 100%);
            color: white;
            margin: 0;
            padding-bottom: 50px;
        }

        .navbar {
            background: rgba(0, 0, 0, 0.8);
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--primary);
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .logo { font-size: 24px; font-weight: 900; color: var(--primary); text-transform: uppercase; }

        .wallet-container {
            background: linear-gradient(45deg, #2ecc71, #27ae60);
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(46, 204, 113, 0.3);
        }

        .hero { padding: 40px 20px; text-align: center; }
        .hero h1 { font-size: 2.5rem; margin-bottom: 10px; color: #fff; }

        .shop-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            padding: 20px 5%;
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            position: relative;
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: var(--primary);
            box-shadow: 0 10px 30px rgba(255, 177, 0, 0.2);
        }

        .card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .card-content { padding: 20px; }
        .card-title { font-size: 20px; font-weight: bold; margin-bottom: 10px; }
        
        .price-tag {
            display: flex;
            align-items: center;
            gap: 5px;
            color: var(--primary);
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .buy-btn {
            background: var(--primary);
            color: #000;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 12px;
            font-weight: 900;
            cursor: pointer;
            transition: 0.3s;
        }

        .buy-btn:hover { background: #fff; transform: scale(1.02); }
        .buy-btn:active { transform: scale(0.98); }

        /* تأثيرات الإشعارات */
        .notification {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 30px;
            border-radius: 10px;
            display: none;
            z-index: 2000;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">PUBG CARS STORE</div>
        <div class="wallet-container">
            💰 الرصيد: <span id="balance">1000</span> UC
        </div>
    </nav>

    <div class="hero">
        <h1>كراج السيارات النادرة</h1>
        <p>اختر سيارتك المفضلة وانطلق في ساحة المعركة</p>
    </div>

    <div class="shop-container">
        <div class="card">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR0N9r5vHbe9xXWpZ98Y6YtWnU-5uK39x2_OQ&s" alt="Dacia">
            <div class="card-content">
                <div class="card-title">داسيا - اليقطين المسحور</div>
                <div class="price-tag">60 UC</div>
                <button class="buy-btn" onclick="processPurchase(60, 'داسيا اليقطين')">امتلاك الآن</button>
            </div>
        </div>

        <div class="card">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT6-m6R-m_O3eNAnZ9H5i8R-A1D8f9j6U6o-A&s" alt="UAZ">
            <div class="card-content">
                <div class="card-title">جيب - غضب الصحراء</div>
                <div class="price-tag">120 UC</div>
                <button class="buy-btn" onclick="processPurchase(120, 'جيب غضب الصحراء')">امتلاك الآن</button>
            </div>
        </div>

        <div class="card">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSyT4T2p-HhP9O3Rk9z0Q5e9k_oW2F9z9-O7Q&s" alt="Lamborghini">
            <div class="card-content">
                <div class="card-title">لامبورجيني - افينتادور</div>
                <div class="price-tag">500 UC</div>
                <button class="buy-btn" onclick="processPurchase(500, 'لامبورجيني')">امتلاك الآن</button>
            </div>
        </div>
    </div>

    <div id="msg" class="notification"></div>

    <script>
        // نظام الرصيد الذكي
        let balance = 1000;

        function processPurchase(price, name) {
            const msgDiv = document.getElementById('msg');
            
            if (balance >= price) {
                balance -= price;
                document.getElementById('balance').innerText = balance;
                
                showNotification(`✅ نجحت العملية! تم إضافة ${name} إلى حسابك.`, "#2ecc71");
            } else {
                showNotification(`❌ رصيد UC غير كافٍ! تحتاج إلى ${price - balance} إضافية.`, "#e74c3c");
            }
        }

        function showNotification(text, color) {
            const msgDiv = document.getElementById('msg');
            msgDiv.innerText = text;
            msgDiv.style.display = "block";
            msgDiv.style.backgroundColor = color;
            
            setTimeout(() => {
                msgDiv.style.display = "none";
            }, 3000);
        }
    </script>
</body>
</html>
