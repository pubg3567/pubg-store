<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>PUBG Crate</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background: radial-gradient(circle,#020617,#000);
  color:white;
  text-align:center;
}

h1 {
  color:#facc15;
}

/* الرصيد */
.balance {
  margin:20px;
  font-size:20px;
}

/* زر */
.open-btn {
  background:gold;
  color:black;
  padding:15px 30px;
  border:none;
  font-size:18px;
  cursor:pointer;
  border-radius:10px;
}

/* spin */
.spinner {
  display:flex;
  overflow:hidden;
  width:320px;
  margin:30px auto;
  border:3px solid gold;
}

.track {
  display:flex;
  transition:transform 3s ease-out;
}

.item {
  width:100px;
  margin:5px;
  padding:10px;
  background:#1f2937;
  border-radius:10px;
}

.legendary { box-shadow:0 0 15px gold; }
.epic { box-shadow:0 0 15px purple; }
.rare { box-shadow:0 0 10px cyan; }

/* popup */
.result {
  position:fixed;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  background:#111827;
  padding:25px;
  border-radius:20px;
  display:none;
  box-shadow:0 0 30px gold;
}
</style>

</head>

<body>

<h1>🎁 PUBG Crate Opening</h1>

<div class="balance">
💰 <span id="coins">1000</span> UC
</div>

<button class="open-btn" onclick="openCrate()">فتح بكج (60 UC)</button>

<div class="spinner">
  <div class="track" id="track"></div>
</div>

<div class="result" id="resultBox">
  <h2 id="resultText"></h2>
</div>

<audio id="sound" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3"></audio>

<script>
let coins = 1000;
document.getElementById("coins").innerText = coins;

let cars = [
 {name:"Buggy", rarity:"rare"},
 {name:"Dacia", rarity:"rare"},
 {name:"UAZ", rarity:"epic"},
 {name:"Mirado", rarity:"epic"},
 {name:"Golden Car", rarity:"legendary"}
];

let track = document.getElementById("track");

// توليد عناصر كثيرة للسبن
function generate(){
  track.innerHTML="";
  for(let i=0;i<30;i++){
    let car = cars[Math.floor(Math.random()*cars.length)];
    track.innerHTML += `<div class="item ${car.rarity}">${car.name}</div>`;
  }
}
generate();

function openCrate(){
  if(coins < 60){
    alert("❌ ما عندك UC");
    return;
  }

  coins -= 60;
  document.getElementById("coins").innerText = coins;

  generate();

  let spin = Math.floor(Math.random()*1000)+1000;
  track.style.transform = "translateX(-"+spin+"px)";

  setTimeout(()=>{
    let win = cars[Math.floor(Math.random()*cars.length)];

    document.getElementById("sound").play();

    document.getElementById("resultText").innerText =
      "🎉 ربحت: " + win.name + " ("+win.rarity+")";

    document.getElementById("resultBox").style.display="block";

    setTimeout(()=>{
      document.getElementById("resultBox").style.display="none";
    },3000);

  },3000);
}
</script>

</body>
</html>
