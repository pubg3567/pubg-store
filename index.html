<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>PUBG Crate</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background: radial-gradient(circle,#000,#020617);
  color:white;
  text-align:center;
}

h1 {
  color:#facc15;
  margin-top:20px;
}

button {
  background:#facc15;
  border:none;
  padding:12px 25px;
  font-size:18px;
  border-radius:10px;
  cursor:pointer;
  margin-top:20px;
}

/* صندوق */
.crate {
  margin:40px auto;
  width:200px;
  height:200px;
  background:linear-gradient(45deg,#444,#111);
  border-radius:15px;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 0 20px gold;
  font-size:20px;
}

/* دوران */
.spin {
  animation:spin 1s linear infinite;
}

@keyframes spin {
  0% {transform:rotate(0);}
  100% {transform:rotate(360deg);}
}

/* النتيجة */
.result {
  display:none;
  margin-top:20px;
  animation:pop 0.4s;
}

@keyframes pop {
  from {transform:scale(0.7);opacity:0;}
  to {transform:scale(1);opacity:1;}
}

.result img {
  width:200px;
  border-radius:15px;
  box-shadow:0 0 20px gold;
}

input {
  padding:10px;
  border-radius:10px;
  border:none;
  margin-top:15px;
}
</style>

</head>

<body>

<h1>🎁 PUBG Crate</h1>

<div class="crate" id="crate">🎁</div>

<button onclick="openCrate()">فتح بكج</button>

<div class="result" id="result">
  <h2 id="carName"></h2>
  <img id="carImg">
  <br>
  <input id="playerID" placeholder="اكتب ID">
  <br><br>
  <button onclick="send()">إرسال</button>
</div>

<script>
let cars = [
 {name:"Buggy", img:"https://i.imgur.com/8Km9tLL.png"},
 {name:"Dacia", img:"https://i.imgur.com/Vz81P9K.png"},
 {name:"UAZ", img:"https://i.imgur.com/9Q9Z1Zm.png"},
 {name:"Mirado", img:"https://i.imgur.com/tK6sF9F.png"}
];

function openCrate(){
  let crate = document.getElementById("crate");
  crate.classList.add("spin");

  setTimeout(()=>{
    crate.classList.remove("spin");

    let random = Math.floor(Math.random()*cars.length);
    let win = cars[random];

    document.getElementById("result").style.display="block";
    document.getElementById("carName").innerText = "🎉 فزت بـ " + win.name;
    document.getElementById("carImg").src = win.img;

    window.selectedCar = win.name;

  },2000);
}

function send(){
  let id = document.getElementById("playerID").value;

  if(id==""){
    alert("اكتب ID");
    return;
  }

  alert("✅ تم إرسال " + selectedCar + " إلى ID: " + id);
}
</script>

</body>
</html>
