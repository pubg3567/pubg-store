<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUBG Mobile Car Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #ffcc00;
            --dark-bg: #0b0b0b;
            --card-bg: #161616;
            --text-gray: #b3b3b3;
        }

        body { 
            font-family: 'Cairo', sans-serif; 
            background-color: var(--dark-bg); 
            color: white; 
            margin: 0;
            overflow-x: hidden;
        }

        /* رأس الصفحة */
        .header { 
            background: linear-gradient(180deg, #1a1a1a 0%, #0b0b0b 100%);
            padding: 40px 20px; 
            border-bottom: 2px solid var(--gold); 
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        h1 { font-weight: 900; letter-spacing: 2px; margin: 0; color: #fff; text-shadow: 2px 2px 10px rgba(255,204,0,0.3); }

        /* صندوق الرصيد */
        .balance-card {
            display: inline-flex;
            align-items: center;
            background: rgba(255, 204, 0, 0.1);
            padding: 10px 25px;
            border-radius: 12px;
            border: 1px solid var(--gold);
            margin-top: 20px;
        }

        .balance-card span { font-size: 24px; color: var(--gold); font-weight: bold; margin: 0 10px; }

        /* شبكة المنتجات */
        .container { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 30px; 
            padding: 50px 20px; 
            max-width: 1200px; 
            margin: auto;
        }

        .card { 
            background: var(--card-bg); 
            border-radius: 20px; 
            padding: 25px; 
            border: 1px solid #222; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center;
        }

        .card:hover { 
            transform: scale(1.05);
            border-color: var(--gold);
            box-shadow: 0 15px 40px rgba(255, 204, 0, 0.15);
        }

        /* تعديل الصور لتعمل مع ملفات GitHub */
        .card img { 
            width: 100%; 
            height: 180px; 
            object-fit: contain; 
            margin-bottom: 20px;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5));
        }

        .car-title { font-size: 22px; font-weight: 700; margin-bottom: 10px; }

        .price-box { font-size: 20px; color: #44ff44; margin-bottom: 25px; font-weight: bold; }

        button { 
            background: var(--gold);
            color: #000;
            border: none; 
            padding: 15px; 
            border-radius: 10px; 
            font-weight: 900; 
            width: 100%; 
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
        }

        button:hover { background: #e6b800; transform: translateY(-2px); }

        /* تنبيه النجاح */
        #notification {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #2ecc71;
            color: white;
            padding: 15px 40px;
            border-radius: 50px;
            font-weight: bold;
            display: none;
            z-index: 9999;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

<div id="notification">تم شراء السيارة وإضافتها للمرآب! ✅</div>

<div class="header">
    <h1>PUBG CARS PREMIUM SHOP</h1>
    <div class="balance-card">
        <img src="https://img.icons8.com/color/30/coins.png" alt="coin">
        <span id="uc-amount">1000</span> UC
    </div>
</div>

<div class="container" id="main-shop">
    </div>

<script>
    // قائمة السيارات مع زيادة السعر 60 لكل وحدة
    // ملاحظة: استبدل "car1.png" بأسماء الصور التي ترفعها على GitHub
    const carsData = [
        { name: "Dacia اليقطين", img: "car1.png" },
        { name: "UAZ الوحش Godzilla", img: "car2.png" },
        { name: "McLaren 570S", img: "car3.png" },
        { name: "Lamborghini SVJ", img: "car4.png" },
        { name: "Koenigsegg Jesko", img: "car5.png" },
        { name: "Aston Martin Valkyrie", img: "car6.png" },
        { name: "Bugatti Chiron", img: "car7.png" },
        { name: "Pagani Imola", img: "car8.png" }
    ];

    let currentUC = localStorage.getItem('userUC') ? parseInt(localStorage.getItem('userUC')) : 1000;
    document.getElementById('uc-amount').innerText = currentUC;

    const shop = document.getElementById('main-shop');

    carsData.forEach((car, index) => {
        const price = 60 + (index * 60);
        
        const cardDiv = document.createElement('div');
        cardDiv.className = 'card';
        cardDiv.innerHTML = `
            <img src="${car.img}" onerror="this.src='https://img.icons8.com/fluency/180/car--v1.png'" alt="${car.name}">
            <div class="car-title">${car.name}</div>
            <div class="price-box">${price} UC</div>
            <button onclick="buyCar(${price})">شراء الآن</button>
        `;
        shop.appendChild(cardDiv);
    });

    function buyCar(cost) {
        if (currentUC >= cost) {
            currentUC -= cost;
            updateBalance();
            showNotice();
        } else {
            alert("رصيد UC غير كافٍ! يرجى شحن حسابك.");
        }
    }

    function updateBalance() {
        document.getElementById('uc-amount').innerText = currentUC;
        localStorage.setItem('userUC', currentUC);
    }

    function showNotice() {
        const note = document.getElementById('notification');
        note.style.display = 'block';
        setTimeout(() => { note.style.display = 'none'; }, 2500);
    }
</script>

</body>
</html>
