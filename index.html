<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>PUBG Shop</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#020617,#0f172a);
  color:white;
  text-align:center;
}

/* العنوان */
h1 {
  color:#facc15;
  margin-top:20px;
}

/* الرصيد */
.balance {
  background:#111827;
  padding:10px;
  width:200px;
  margin:15px auto;
  border-radius:10px;
}

/* السيارات */
.shop {
  display:flex;
  justify-content:center;
  gap:20px;
  flex-wrap:wrap;
}

.card {
  background:#1f2937;
  width:220px;
  border-radius:15px;
  overflow:hidden;
  transition:0.3s;
  box-shadow:0 0 10px black;
}

.card:hover {
  transform:translateY(-5px);
  box-shadow:0 0 20px #facc15;
}

.card img {
  width:100%;
  height:140px;
  object-fit:cover;
}

.card h3 {
  margin:10px 0 5px;
}

.card p {
  color:#22c55e;
}

button {
  background:#22c55e;
  border:none;
  padding:10px;
  width:100%;
  color:white;
  cursor:pointer;
  font-size:16px;
}

button:hover {
  background:#16a34a;
}

/* popup */
.popup {
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.8);
  display:none;
  align-items:center;
  justify-content:center;
}

.popup-box {
  background:#020617;
  padding:20px;
  border-radius:15px;
  width:300px;
  box-shadow:0 0 20px #facc15;
  animation:pop 0.25s ease;
}

@keyframes pop {
  from {transform:scale(0.7);opacity:0;}
  to {transform:scale(1);opacity:1;}
}

.popup-box img {
  width:100%;
  border-radius:10px;
}

input {
  width:90%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:8px;
}

/* نجاح */
.success {
  position:fixed;
  top:20px;
  right:20px;
  background:#22c55e;
  padding:15px;
  border-radius:10px;
  display:none;
  animation:slide 0.3s;
}

@keyframes slide {
  from {transform:translateX(100px);opacity:0;}
  to {transform:translateX(0);opacity:1;}
}
</style>

</head>

<body>

<h1>🚗 PUBG Car Shop</h1>

<div class="balance">
💰 <span id="coins">1000</span> UC
</div>

<div class="shop" id="shop"></div>

<!-- popup -->
<div class="popup" id="popup">
  <div class="popup-box">
    <img id="carImg">
    <h3 id="carName"></h3>
    <input id="playerID" placeholder="Player ID">
    <br><br>
    <button onclick="confirmBuy()">Confirm</button>
    <button onclick="closePopup()" style="background:red;margin-top:5px;">Cancel</button>
  </div>
</div>

<!-- success -->
<div class="success" id="successBox"></div>

<script>
let coins = 1000;
let selectedPrice = 0;
let selectedCar = "";

document.getElementById("coins").innerText = coins;

let cars = [
 {name:"Buggy", price:60, img:"https://i.imgur.com/8Km9tLL.png"},
 {name:"Dacia", price:120, img:"https://i.imgur.com/Vz81P9K.png"},
 {name:"UAZ", price:180, img:"https://i.imgur.com/9Q9Z1Zm.png"}
];

let shop = document.getElementById("shop");

cars.forEach(car=>{
  shop.innerHTML += `
    <div class="card">
      <img src="${car.img}">
      <h3>${car.name}</h3>
      <p>${car.price} UC</p>
      <button onclick="openPopup(${car.price},'${car.name}','${car.img}')">Buy</button>
    </div>
  `;
});

function openPopup(price,name,img){
  selectedPrice = price;
  selectedCar = name;
  document.getElementById("popup").style.display="flex";
  document.getElementById("carImg").src = img;
  document.getElementById("carName").innerText = name;
}

function closePopup(){
  document.getElementById("popup").style.display="none";
}

function confirmBuy(){
  let id = document.getElementById("playerID").value;

  if(id=="") return;

  if(coins >= selectedPrice){
    coins -= selectedPrice;
    document.getElementById("coins").innerText = coins;

    closePopup();

    let box = document.getElementById("successBox");
    box.innerText = "✅ Sent " + selectedCar + " to ID: " + id;
    box.style.display="block";

    setTimeout(()=>{ box.style.display="none"; },3000);
  }
}
</script>

</body>
</html>
