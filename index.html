<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUBG Mobile | Tactical Garage (FIXED)</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-green: #00ffcc;
            --army-gray: #1a1c1e;
            --cyber-yellow: #ffcc00;
        }

        body { 
            font-family: 'Cairo', sans-serif; 
            background-color: #050505;
            color: white; 
            margin: 0;
            background-image: linear-gradient(rgba(0, 255, 204, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 255, 204, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        /* الهيدر التكتيكي */
        .top-bar {
            background: var(--army-gray);
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--neon-green);
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.2);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .system-status { font-family: 'Orbitron', sans-serif; font-size: 14px; color: var(--neon-green); }

        .uc-display {
            background: #000;
            border: 1px solid var(--cyber-yellow);
            padding: 5px 20px;
            border-radius: 4px;
            color: var(--cyber-yellow);
            font-weight: 900;
            font-size: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* حاوية المتجر */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            padding: 40px 5%;
        }

        .tactical-card {
            background: rgba(26, 28, 30, 0.9);
            border-left: 4px solid var(--neon-green);
            padding: 20px;
            position: relative;
            transition: 0.3s;
            clip-path: polygon(0 0, 100% 0, 100% 90%, 90% 100%, 0 100%);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .tactical-card:hover { background: #25282c; transform: scale(1.02); }

        .image-wrapper {
            width: 100%;
            height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin-bottom: 15px;
        }

        .tactical-card img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 0 10px rgba(0, 255, 204, 0.3));
        }

        .car-info { border-top: 1px solid #333; padding-top: 10px; }
        .car-name { font-family: 'Orbitron', sans-serif; font-size: 18px; color: #fff; margin-bottom: 5px; }
        .car-class { font-size: 12px; color: #888; text-transform: uppercase; margin-bottom: 10px; display: block;}
        .price { color: var(--neon-green); font-size: 24px; font-weight: bold; margin: 10px 0; font-family: 'Orbitron'; }

        .buy-action {
            background: var(--neon-green);
            color: #000;
            border: none;
            padding: 12px;
            width: 100%;
            font-weight: 900;
            cursor: pointer;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
            transition: 0.3s;
        }

        .buy-action:hover { background: #fff; box-shadow: 0 0 15px #fff; }

        /* المرآب الشخصي */
        .garage-section {
            background: #0a0a0a;
            padding: 50px 5%;
            margin-top: 50px;
            border-top: 1px dashed var(--neon-green);
        }

        .garage-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 20px;
        }

        .owned-car {
            width: 120px;
            height: 120px;
            background: #1a1c1e;
            border: 1px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            padding: 10px;
            transition: 0.3s;
        }
        
        .owned-car:hover { border-color: var(--neon-green); transform: translateY(-5px); }

        .owned-car img { max-width: 100%; max-height: 100%; object-fit: contain; }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="system-status">SYS_STATUS: ACTIVE // GARAGE_v4.1</div>
    <div class="uc-display">
        <img src="https://img.icons8.com/fluency/30/coins.png" alt="UC"/>
        <span id="uc-val">5000</span> UC
    </div>
</div>

<h1 style="text-align: center; margin-top: 50px; font-family: 'Orbitron'; font-weight: 900; letter-spacing: 3px; color: #fff;">CENTRAL MARKETPLACE</h1>
<div class="grid-container" id="shop"></div>

<div class="garage-section">
    <h2 style="font-family: 'Orbitron'; color: var(--neon-green); letter-spacing: 2px;">MY PRIVATE GARAGE</h2>
    <div class="garage-grid" id="myGarage">
        </div>
</div>

<script>
    // بيانات السيارات مع روابط صور جديدة وشغالة ومستضافة على GitHub
    const carData = [
        { id: 1, name: "McLaren 570S", class: "Supercar", img: "https://raw.githubusercontent.com/A7med-Ragaa/PUBG-Car-Images/main/mclaren.png" },
        { id: 2, name: "Lamborghini SVJ", class: "Supercar", img: "https://raw.githubusercontent.com/A7med-Ragaa/PUBG-Car-Images/main/lambo.png" },
        { id: 3, name: "Koenigsegg Jesko", class: "Hypercar", img: "https://raw.githubusercontent.com/A7med-Ragaa/PUBG-Car-Images/main/koenigsegg.png" },
        { id: 4, name: "Dodge Challenger", class: "Muscle", img: "https://raw.githubusercontent.com/A7med-Ragaa/PUBG-Car-Images/main/dodge.png" },
        { id: 5, name: "Aston Martin Valkyrie", class: "Hypercar", img: "https://raw.githubusercontent.com/A7med-Ragaa/PUBG-Car-Images/main/aston.png" },
        { id: 6, name: "Bugatti La Voiture Noire", class: "Hypercar", img: "https://raw.githubusercontent.com/A7med-Ragaa/PUBG-Car-Images/main/bugatti.png" }
    ];

    let wallet = localStorage.getItem('wallet_uc_v4') ? parseInt(localStorage.getItem('wallet_uc_v4')) : 5000;
    let myCars = JSON.parse(localStorage.getItem('owned_cars_v4')) || [];

    function init() {
        document.getElementById('uc-val').innerText = wallet;
        renderShop();
        renderGarage();
    }

    function renderShop() {
        const shop = document.getElementById('shop');
        shop.innerHTML = '';
        carData.forEach((car, index) => {
            const price = 60 + (index * 60);
            shop.innerHTML += `
                <div class="tactical-card">
                    <div class="image-wrapper">
                        <img src="${car.img}" onerror="this.src='https://img.icons8.com/fluency/180/car--v1.png'; this.style.opacity=0.3;">
                    </div>
                    <div class="car-info">
                        <span class="car-class">${car.class}</span>
                        <div class="car-name">${car.name}</div>
                        <div class="price">${price} UC</div>
                        <button class="buy-action" onclick="buy(${index}, ${price})">ACQUIRE UNIT</button>
                    </div>
                </div>
            `;
        });
    }

    function buy(index, cost) {
        if (wallet >= cost) {
            wallet -= cost;
            myCars.push(carData[index]);
            save();
            init();
            alert("SUCCESS: UNIT TRANSFERRED TO GARAGE");
        } else {
            alert("ERROR: INSUFFICIENT UC BALANCE");
        }
    }

    function renderGarage() {
        const garage = document.getElementById('myGarage');
        garage.innerHTML = myCars.length === 0 ? '<p style="color:#555; font-family: Cairo;">لم تقم بالاستحواذ على أي وحدات بعد...</p>' : '';
        myCars.forEach(car => {
            garage.innerHTML += `<div class="owned-car"><img src="${car.img}" onerror="this.src='https://img.icons8.com/fluency/180/car--v1.png'; this.style.opacity=0.3;"></div>`;
        });
    }

    function save() {
        localStorage.setItem('wallet_uc_v4', wallet);
        localStorage.setItem('owned_cars_v4', JSON.stringify(myCars));
    }

    init();
</script>

</body>
</html>
