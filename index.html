<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>متجر ببجي</title>
<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg,#020617,#0f172a);
  color: white;
  text-align: center;
}

h1 {
  color: gold;
}

.card {
  background:#1f2937;
  padding:20px;
  border-radius:20px;
  width:250px;
  margin:auto;
  box-shadow:0 0 15px black;
  transition:0.3s;
}

.card:hover {
  transform: scale(1.05);
  box-shadow:0 0 25px gold;
}

img {
  width:100%;
  border-radius:15px;
}

button {
  background:green;
  color:white;
  border:none;
  padding:12px;
  border-radius:10px;
  cursor:pointer;
  font-size:18px;
}

.balance {
  margin:20px;
  font-size:20px;
}
</style>
</head>

<body>

<h1>🚗 متجر ببجي</h1>

<div class="balance">
💰 رصيدك: <span id="coins">1000</span>
</div>

<div class="card">
<img src="https://i.imgur.com/8Km9tLL.png">
<h2>Buggy</h2>
<p>السعر: 50 عملة</p>
<button onclick="buy()">شراء</button>
</div>

<audio id="sound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<script>
let coins = localStorage.getItem("coins") || 1000;
document.getElementById("coins").innerText = coins;

function buy(){
  let price = 50;
  coins = parseInt(coins);

  if(coins >= price){
    coins -= price;
    localStorage.setItem("coins", coins);
    document.getElementById("coins").innerText = coins;
    document.getElementById("sound").play();
    alert("✅ تم الشراء");
  } else {
    alert("❌ رصيدك ما يكفي");
  }
}
</script>

</body>
</html>
